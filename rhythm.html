<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Switch</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

body.custom-mode .cell{
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.25);
}

body.custom-mode .cell.active{
  background:#1e90ff;
  box-shadow:0 0 14px rgba(30,144,255,0.9);
  transform:scale(1.02);
}

/* TOP */
.top{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  
  z-index: 10;

  display:flex;
  align-items:center;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
    width:60px;
    text-align:center;
    font-size:20px;
    cursor:pointer;

    position: relative;
    z-index: 10;
}

.title{
  flex:1;
  text-align:center;
  font-weight:bold;
}

#readyText{
  position:absolute;
  font-size:35px;
  font-weight:bold;
  margin-top: -100px;
  opacity:1;
  letter-spacing:2px;
}

/* MODES */
.modes{
  position:fixed;
  top:60px;
  left:0;right:0;
  z-index: 1;

  display:flex;
  justify-content:space-around;

  padding:10px 0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.mode{
  font-size:12px;
  opacity:0.4;
  cursor:pointer;
}

.mode.active{
  opacity:1;
  color:#1e90ff;
}

/* CENTER */
.center{
  position:fixed;
  top:0;bottom:0;left:0;right:0;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:18px;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,55px);
  grid-template-rows:repeat(4,55px);
  gap:8px;
}

.cell{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;
  opacity:1;
  transition:0.15s;
}

.cell.active{
  background:#1e90ff;
  border:1px solid #3aa0ff;

  /* 🔥 glow léger */
  /*box-shadow:0 0 5px rgba(30,144,255,0.6);*/
}

/* BUTTON */
#btn{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:#fff;
}

/* REP BAR */
.rep-bar{
  display:flex;
  gap:10px;
  font-size:12px;
  opacity:0.8;
}

.rep{
  padding:6px 10px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;
  cursor:pointer;
}

.rep.active{
  background:#1e90ff;
  border-color:#1e90ff;
}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;left:0;right:0;

  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.08);
}

.bpm-control{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:12px;
}

input[type="range"]{
  width:120px;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <div class="back" onclick="goHome()">←</div>
  <div class="title">RHYTHM SWITCH</div>
  <div style="width:60px"></div>
</div>

<!-- MODES -->
<div class="modes">
  <div class="mode active" onclick="setMode('random',this)">RANDOM</div>
  <div class="mode" onclick="setMode('custom',this)">CUSTOM</div>
</div>

<!-- CENTER -->
<div class="center">

  <div id="readyText">READY</div>
  <div id="grid"></div>

  <!-- REPETITION -->
  <div class="rep-bar">
    <div class="rep active" onclick="setRepeat(4,this)">x4</div>
    <div class="rep" onclick="setRepeat(8,this)">x8</div>
    <div class="rep" onclick="setRepeat(16,this)">x16</div>
  </div>

  <button id="btn" onclick="toggle()">START</button>

</div>

<!-- BOTTOM -->
<div class="bottom">

  <div class="bpm-control">
    BPM <span id="bpmValue">100</span>
  </div>

  <input type="range" min="60" max="200" value="100" id="bpm">

</div>

<script>

/* STATE */
let mode="random";
let running=false;

let step=0;
let cycle=0;
let interval;

let repeatValue=4;

let grid=[];

/* AUDIO */
const ctx=new AudioContext();

function click(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();

  o.frequency.value=800;
  g.gain.value=0.15;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime+0.05);
}

/* GRID */
function initGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[];

  for(let i=0;i<16;i++){
    const c=document.createElement("div");
    c.className="cell";

    c.onclick=()=>{
      if(mode==="custom"){
        c.classList.toggle("active");
      }
    };

    grid.push(c);
    g.appendChild(c);
  }

  resetGridVisual(); // important
}

function generateRandom(){
  grid.forEach(c=>{
    c.classList.remove("active");
    if(Math.random()>0.65) c.classList.add("active");
  });
}

/* MODE */
function setMode(m, el){
  mode = m;

  document.querySelector(".rep-bar").style.display =
    mode === "custom" ? "none" : "flex";

  document.querySelectorAll(".mode").forEach(x =>
    x.classList.remove("active")
  );
  el.classList.add("active");

  document.body.classList.toggle("custom-mode", mode === "custom");
  
  stop();
  initGrid();

  // 🔥 RESET UI STATE
  if(mode === "custom"){
    document.getElementById("readyText").style.display = "none";
  }
}

/* BPM */
const bpm=document.getElementById("bpm");
const bpmValue=document.getElementById("bpmValue");

bpm.oninput=()=>{
  bpmValue.innerText=bpm.value;
  if(running){
    clearInterval(interval);
    interval=setInterval(playStep,getSpeed());
  }
};

function getSpeed(){
  return (60/bpm.value)*1000/4;
}

/* START STOP */
function toggle(){
  if(!running) start();
  else stop();
}

function resetGridVisual(){
  grid.forEach(c=>{
    c.classList.remove("active");
    c.style.opacity="0.3";
  });
}

function start(){
  running=true;

  clearInterval(interval);

  document.getElementById("btn").innerText="STOP";

  document.getElementById("readyText").style.display="none";

  ctx.resume();

  step=0;
  cycle=0;

  if(mode==="random"){
    generateRandom();
  }

  interval=setInterval(playStep,getSpeed());
}

function stop(){
  running=false;
  clearInterval(interval);

  document.getElementById("btn").innerText="START";

  if(mode !== "custom"){
    document.getElementById("readyText").style.display = "block";
  }
  
  step=0;
  cycle=0;

  resetGridVisual();

}

/* LOOP */
function playStep(){

  grid.forEach(c=>{
  c.style.opacity="0.3";
  });

  const c = grid[step];

  // 🔥 CLICK normal (tous les steps)
  if(c.classList.contains("active")){
    click();
  }

  // 🎯 TEMPS FORT (4 beats : 0,4,8,12)
  if(step % 4 === 0){
    stick();
  }

  c.style.opacity="1";

  step++;

  if(step>=16){
    step=0;
    cycle++;

    if(mode==="random" && cycle>=repeatValue){
      generateRandom();
      cycle=0;
    }
  }
}

function stick(){
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.type = "square";
  o.frequency.value = 300; // plus grave = temps fort

  g.gain.value = 0.25;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime + 0.08);
}

/* BACK */
function goHome(){
  window.location.href = 'playground.html';
}

/* INIT */
initGrid();

</script>

</body>
</html>
