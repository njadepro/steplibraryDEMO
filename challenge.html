<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Challenge</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

.top{
  height:60px;
  display:flex;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.back{
  width:60px;
  text-align:center;
  cursor:pointer;
}

.title{
  flex:1;
  text-align:center;
}

.content{
  padding:20px;
  text-align:center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:#fff;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="top">
  <div class="back" onclick="goBack()">←</div>
  <div class="title">DAILY CHALLENGE</div>
  <div style="width:60px"></div>
</div>

<div class="content">

  <h2>Reste sur le tempo</h2>
  <p>Tiens le rythme pendant 2 minutes sans perdre le tempo.</p>

  <button onclick="startChallenge()">START</button>

</div>

<script>
function goBack(){
  window.location.href = "index.html";
}

function startChallenge(){
  alert("Challenge lancé !");
}
</script>

</body>
</html>
