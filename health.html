<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Motrix - Play</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;

  display:flex;
  align-items:center;
  gap:12px;

  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  border-color:#1e90ff;
  transform:translateY(-2px);
}

.card i{
  width:22px;
  height:22px;
  stroke:#1e90ff;
}

.card h3{
  margin:0;
  font-size:15px;
}

.card p{
  margin:4px 0 0;
  font-size:12px;
  color:rgba(255,255,255,0.5);
}

/* ===== BOTTOM ===== */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  display:flex;
  justify-content:space-around;
  padding:14px 0;

  background:#000;
  border-top:1px solid rgba(255,255,255,0.1);
}

.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  gap:4px;
  cursor:pointer;
}

.tab svg{
  width:22px;
  height:22px;
}

.tab.active{
  color:#1e90ff;
}

.tab.active svg{
  stroke:#1e90ff;
}

</style>
</head>

<div class="title">
  <h1>YOU CAN LEARN BOUT HEALTH AND TIPS HERE</h1> 
</div>


<!-- BOTTOM -->
<div class="bottom-bar">

  <div class="tab" onclick="window.location='music.html'">
    <i data-lucide="headphones"></i>
    MUSIC
  </div>

  <div class="tab active">
    <i data-lucide="heart-plus"></i>
    SANTÉ
  </div>

  <div class="tab" onclick="window.location='playground.html'">
    <i data-lucide="gamepad-2"></i>
    JOUER
  </div>

  <div class="tab" onclick="window.location='library.html'">
    <i data-lucide="box"></i>
    BIBLIOTHÈQUE
  </div>

  <div class="tab" onclick="window.location='dashboard.html'">
    <i data-lucide="activity"></i>
    PROGRESS
  </div>  

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
