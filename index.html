<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motrix Access</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial;
}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* ===== CENTER WRAPPER ===== */
.screen{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  gap:18px;
}

/* ===== GLOW ===== */
.glow{
  position:absolute;
  width:380px;
  height:380px;
  background:#1e90ff;
  filter:blur(160px);
  opacity:0.18;
  border-radius:50%;
}

/* ===== LOGO ===== */
.logo{
  width:140px;
  opacity:0;
  filter:drop-shadow(0 0 30px #1e90ff);
  animation:logoIn 2.5s ease forwards;
}

@keyframes logoIn{
  0%{opacity:0; transform:scale(0.85);}
  40%{opacity:1;}
  100%{opacity:0.35; transform:scale(1.05);}
}

/* ===== TEXT ===== */
.text{
  font-size:26px;
  color:#fff;
  letter-spacing:3px;
  min-height:70px;
  font-weight:500;
  text-transform:uppercase;
  max-width:90%;
}

/* glitch effect */
.text span{
  display:inline-block;
  animation:glitch 0.08s linear;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(1px,-1px);}
  50%{transform:translate(-1px,1px);}
  100%{transform:translate(0);}
}

/* ===== INPUT ===== */
input{
  width:260px;
  padding:12px 14px;

  border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);

  background:rgba(255,255,255,0.05);
  color:#fff;
  outline:none;

  text-align:center;
  font-size:14px;

  display:none;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

input:focus{
  border-color:#1e90ff;
  box-shadow:0 0 15px rgba(30,144,255,0.3);
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="screen">

  <!-- LOGO -->
  <img src="logo.png" class="logo" id="logo"/>

  <!-- TEXT -->
  <div class="text" id="text"></div>

  <!-- PASSWORD -->
  <input type="password" id="password" placeholder="ACCESS CODE"/>

</div>

<!-- typing sound -->
<audio id="keySound" src="https://assets.mixkit.co/sfx/preview/mixkit-typewriter-soft-click-1125.mp3"></audio>

<script>
const textEl = document.getElementById("text");
const input = document.getElementById("password");
const logo = document.getElementById("logo");
const keySound = document.getElementById("keySound");

const PASSWORD = "MOTRIXPROJECT";

/* ===== TYPE EFFECT ===== */
function typeText(text, speed = 40, callback){

  let i = 0;
  textEl.innerHTML = "";

  const interval = setInterval(() => {

    const char = text[i];

    if(char && char !== " "){
      keySound.currentTime = 0;
      keySound.play();
    }

    const span = document.createElement("span");
    span.textContent = char;
    textEl.appendChild(span);

    i++;

    if(i >= text.length){
      clearInterval(interval);
      if(callback) callback();
    }

  }, speed);
}

/* ===== BOOT SEQUENCE ===== */
setTimeout(() => {

  typeText("SYSTEM INITIALIZING...", 45, () => {

    setTimeout(() => {

      typeText("NEURAL LINK STABLE", 45, () => {

        setTimeout(() => {

          typeText("ACCESS REQUEST DETECTED", 45, () => {

            input.style.display = "block";
            input.focus();

            typeText("ENTER ACCESS CODE", 35);

          });

        }, 600);

      });

    }, 600);

  });

}, 1800);

/* ===== PASSWORD CHECK ===== */
input.addEventListener("input", () => {

  if(input.value === PASSWORD){

    input.style.display = "none";

    typeText("ACCESS GRANTED", 40, () => {

      // fade logo
      logo.style.transition = "1.2s ease";
      logo.style.opacity = "0";
      logo.style.transform = "scale(1.15)";

      setTimeout(() => {

        document.body.style.transition = "1.5s ease";
        document.body.style.opacity = "0";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1200);

      }, 900);

    });
  }
});
</script>

</body>
</html>
