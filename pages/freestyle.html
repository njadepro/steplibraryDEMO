<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREESTYLE</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* TOP */
.top{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  z-index:30;

  display:flex;
  align-items:center;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  width:60px;
  text-align:center;
  font-size:20px;
  cursor:pointer;
}

.title{
  flex:1;
  text-align:center;
  font-weight:bold;
}

/* CENTER */
.center{
  position:fixed;
  top:0;bottom:0;left:0;right:0;
  z-index:5;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}

/* READY */
#readyText{
  position:absolute;
  top:50%;
  transform:translateY(-140%);
  font-size:20px;
  font-weight:bold;
  letter-spacing:2px;
  z-index:15;
  pointer-events:none;
  color: #ffff;
}

/* ===== BOTTOM ===== */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  
  z-index: 9999;

  display:flex;
  justify-content:space-around;
  padding:14px 0;

  background:#000;
  border-top:1px solid rgba(255,255,255,0.1);
}

.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  gap:4px;
  cursor:pointer;

  justify-content:center;
  font-size:10px;
  text-align:center;
  min-width:60px;
}

.tab svg{
  width:22px;
  height:22px;
}

.tab.active{
  color:#1e90ff;
}

.tab.active svg{
  stroke:#1e90ff;
}

</style>
</head>

<!-- TOP -->
<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="title">ÉCHAUFFEMENT</div>
  <div style="width:60px"></div>
</div>

<div class="center">
  <div id="readyText">EN COURS DE CONSTRUCTION</div>
</div>

<!-- BOTTOM -->
<div class="bottom-bar">

  <div class="tab" onclick="window.location='music.html'">
    <i data-lucide="headphones"></i>
    MUSIC
  </div>

  <div class="tab" onclick="window.location='health.html'">
    <i data-lucide="heart-plus"></i>
    SANTÉ
  </div>

  <div class="tab active">
    <i data-lucide="gamepad-2"></i>
    JOUER
  </div>

  <div class="tab" onclick="window.location='library.html'">
    <i data-lucide="box"></i>
    BIBLIOTHÈQUE
  </div>

  <div class="tab" onclick="window.location='dashboard.html'">
    <i data-lucide="activity"></i>
    PROGRESS
  </div> 

</div>

<script>
lucide.createIcons();
</script>
