<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOCUS</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* TOP */
.top{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  display:flex;
  z-index: 10;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  width:60px;
  text-align:center;
  font-size:20px;
  cursor:pointer;
  z-index: 10;
}

.title{
  flex:1;
  text-align:center;
  font-weight:bold;
}

/* MODES */
.modes{
  position:fixed;
  top:60px;left:0;right:0;
  display:flex;
  z-index: 1;
  justify-content:space-around;
  padding:10px 0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.mode{
  font-size:12px;
  opacity:0.4;
  cursor:pointer;
}

.mode.active{
  opacity:1;
  color:#1e90ff;
}

/* CENTER */
.center{
  position:fixed;
  top:0;bottom:60px;left:0;right:0;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:16px;
  text-align:center;
}

#ready{
  font-size:28px;
  font-weight:bold;
}

#timerDisplay{
  font-size:22px;
  opacity:0.8;
}

#display{
  font-size:18px;
  min-height:20px;
}

/* CUSTOM */
#customLine{
  display:none;
  gap:8px;
}

select{
  padding:6px;
  border-radius:6px;
  border:none;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:#fff;
  cursor:pointer;
}

/* SWITCH */
.bottom-switch{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.08);
}

.switch-option{
  font-size:11px;
  padding:6px 10px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;
  cursor:pointer;
  opacity:0.5;
}

.switch-option.active{
  opacity:1;
  background:#1e90ff;
  border-color:#1e90ff;
}

.switch-option.disabled{
  opacity:0.15;
  pointer-events:none;
  filter:grayscale(1);
}

/* ===== BOTTOM ===== */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  z-index: 9999;
  
  display:flex;
  justify-content:space-around;
  padding:14px 0;

  background:#000;
  border-top:1px solid rgba(255,255,255,0.1);
}

.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  gap:4px;
  cursor:pointer;

  justify-content:center;
  font-size:10px;
  text-align:center;
  min-width:60px;
}

.tab svg{
  width:22px;
  height:22px;
}

.tab.active{
  color:#1e90ff;
}

.tab.active svg{
  stroke:#1e90ff;
}

/* MOBILE FIX */
@media (max-width:600px){
  .tab{
    font-size:9px;
  }
}

</style>
</head>

<body>

<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="title">FOCUS</div>
  <div style="width:60px"></div>
</div>

<div class="modes">
  <div class="mode active" onclick="setMode('random',this)">RANDOM</div>
  <div class="mode" onclick="setMode('focus',this)">FOCUS</div>
  <div class="mode" onclick="setMode('custom',this)">CUSTOM</div>
</div>

<div class="center">

  <div id="ready">PRÊT</div>
  <div id="timerDisplay" style="display:none;">00:00</div>

  <div id="display"></div>

  <!-- CUSTOM -->
  <div id="customLine">

    <select id="bodySelect">
      <option>haut du corp</option>
      <option>bas du corp</option>
      <option>tout le corp</option>
    </select>

    <select id="grooveSelect">
      <option>fluide</option>
      <option>sec</option>
      <option>lourd</option>
      <option>saccadé</option>
      <option>tremblement</option>
    </select>

    <select id="timingSelect">
      <option>temps plein</option>
      <option>demi temps</option>
      <option>contre temps</option>
      <option>double temps</option>
      <option>en retard</option>
      <option>en avance</option>
    </select>

  </div>

  <button onclick="toggle()" id="btn">START</button>

</div>

<!-- SWITCH -->
<div class="bottom-switch">
  <div class="switch-option active" onclick="setSwitch(0,this)">OFF</div>
  <div class="switch-option" onclick="setSwitch(30,this)">30SEC</div>
  <div class="switch-option" onclick="setSwitch(60,this)">1MIN</div>
  <div class="switch-option" onclick="setSwitch(90,this)">1MIN30</div>
  <div class="switch-option" onclick="setSwitch(120,this)">2MIN</div>
  <div class="switch-option" onclick="setSwitch(180,this)">3MIN</div>
</div>


<!-- BOTTOM -->
<div class="bottom-bar">

  <div class="tab" onclick="window.location='music.html'">
    <i data-lucide="headphones"></i>
    MUSIC
  </div>

  <div class="tab" onclick="window.location='health.html'">
    <i data-lucide="heart-plus"></i>
    SANTÉ
  </div>

  <div class="tab active">
    <i data-lucide="gamepad-2"></i>
    JOUER
  </div>

  <div class="tab" onclick="window.location='library.html'">
    <i data-lucide="box"></i>
    BIBLIOTHÈQUE
  </div>

  <div class="tab" onclick="window.location='dashboard.html'">
    <i data-lucide="activity"></i>
    PROGRESS
  </div> 

</div>

<script>

lucide.createIcons();

let mode="random";
let running=false;

let timer=0;
let timerInterval;
let switchInterval;

let switchValue=0;
let customLocked=false;

/* MODE */
function setMode(m,el){

  stop();

  mode=m;

  document.querySelectorAll(".mode")
    .forEach(x=>x.classList.remove("active"));

  el.classList.add("active");

  document.getElementById("customLine").style.display =
    mode==="custom" ? "flex" : "none";

  updateSwitchState();
}

/* SWITCH */
function setSwitch(v,el){

  if(mode==="custom") return;

  switchValue=v;

  document.querySelectorAll(".switch-option")
    .forEach(x=>x.classList.remove("active"));

  el.classList.add("active");

  restartSwitch();
}

function updateSwitchState(){
  document.querySelectorAll(".switch-option").forEach(el=>{
    el.classList.toggle("disabled", mode==="custom");
  });
}

/* START */
function toggle(){
  running ? reset() : start();
}

function start(){

  running=true;

  document.getElementById("btn").innerText="RESET";
  document.getElementById("ready").style.display="none";
  document.getElementById("timerDisplay").style.display="block";

  if(mode==="custom"){
    customLocked=true;
    document.getElementById("customLine").style.display="none";
  }

  timer=0;

  timerInterval=setInterval(()=>{
    timer++;
    let m=Math.floor(timer/60);
    let s=timer%60;
    document.getElementById("timerDisplay").innerText=`${pad(m)}:${pad(s)}`;
  },1000);

  restartSwitch();
  generate();
}

/* RESET */
function reset(){

  running=false;

  clearInterval(timerInterval);
  clearInterval(switchInterval);

  document.getElementById("btn").innerText="START";

  document.getElementById("ready").style.display="block";
  document.getElementById("timerDisplay").style.display="none";
  document.getElementById("display").innerText="";

  if(mode==="custom"){
    customLocked=false;
    document.getElementById("customLine").style.display="flex";
  }
}

/* SWITCH ENGINE */
function restartSwitch(){

  clearInterval(switchInterval);

  if(!running || switchValue<=0) return;

  switchInterval=setInterval(generate, switchValue*1000);
}

/* GENERATE (FIX CLEAN) */
function generate(){

  if(mode==="custom" && customLocked) return;

  let txt="";

  if(mode==="random"){
    txt = `${r(["haut","bas","full body"])}, ${r(["fluide","sec","lourd"])}, ${r(["temps plein","demi temps","contre temps"])}`;
  }

  if(mode==="focus"){
    txt = `Focus : ${r(["haut","bas","full body","fluide","sec","lourd","temps plein","demi temps","contre temps"])}`;
  }

  if(mode==="custom"){
    txt = `${v("bodySelect")}, ${v("grooveSelect")}, ${v("timingSelect")}`;
    customLocked = true;
    document.getElementById("customLine").style.display="none";
  }

  show(txt);
  speak(txt);
}

/* HELPERS */
function r(a){return a[Math.floor(Math.random()*a.length)]}
function v(id){return document.getElementById(id).value}

function show(t){
  document.getElementById("display").innerText=t;
}

function pad(n){return n<10?"0"+n:n}

/* VOICE */
function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  u.lang="fr-FR";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* STOP */
function stop(){
  running=false;
  clearInterval(timerInterval);
  clearInterval(switchInterval);
}

updateSwitchState();

</script>

</body>
</html>
