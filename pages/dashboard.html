<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* ===== GLOW ===== */
.glow{
  position:absolute;
  width:350px;
  height:380px;
  z-index: -10;
  background:#1e90ff;
  filter:blur(160px);
  opacity:0.18;
  border-radius:80%;
}

/* CONTENT */
.content{
  flex:1;
  padding:105px 16px 90px; /* 🔥 space for banner + bottom bar */
  overflow:hidden;
}

/* HEADER */
.header{
  margin-bottom:12px;
}

.title{
  font-size:24px;
  font-weight:800;
  letter-spacing:1px;
}

.sub{
  font-size:12px;
  color:rgba(255,255,255,0.5);
  margin-top:4px;
}

/* XP */
.xp-box{ margin-top:12px; }

.bar{
  height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  overflow:hidden;
}

.fill{
  width:45%;
  height:100%;
  background:#1e90ff;
}

/* SECTION */
.section-title{
  font-size:11px;
  letter-spacing:1.5px;
  color:rgba(255,255,255,0.5);
  margin:16px 0 10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  padding:12px;
  border-radius:14px;

  display:flex;
  align-items:center;
  gap:10px;

  min-height:70px;
}

.card i{
  width:20px;
  height:20px;
  stroke:#1e90ff;
}

.card h3{
  margin:0;
  font-size:13px;
}

.card p{
  margin:3px 0 0;
  font-size:11px;
  color:rgba(255,255,255,0.5);
}

/* TASKS */
.tasks{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.task{
  display:flex;
  align-items:center;
  gap:10px;

  padding:10px 12px;
  border-radius:10px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
}

.task input{
  accent-color:#1e90ff;
}

.task.done span{
  text-decoration:line-through;
  opacity:0.4;
}

/* OBJECTIVES */
.note-box{
  margin-top:10px;
}

textarea{
  width:100%;
  height:90px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;

  padding:12px;
  color:#fff;
  outline:none;
  resize:none;
  font-size:13px;
}

/* ================= BANNER ================= */
.challenge-banner{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:50;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:8px 12px;
  background:rgba(30,144,255,0.08);
  border-bottom:1px solid rgba(30,144,255,0.25);
  backdrop-filter:blur(10px);
}

.challenge-left{
  display:flex;
  align-items:center;
  gap:8px;
  overflow:hidden;
  flex:1;
}

.challenge-left i{
  width:18px;
  height:18px;
  stroke:#1e90ff;
}

.scroll-text{
  white-space:nowrap;
  animation:scroll 10s linear infinite;
  color:#1e90ff;
  font-weight:600;
  font-size:12px;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.close-banner i{
  width:18px;
  height:18px;
  stroke:rgba(255,255,255,0.7);
  cursor:pointer;
}

/* ===== BOTTOM ===== */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  display:flex;
  justify-content:space-around;
  padding:14px 0;

  background:#000;
  border-top:1px solid rgba(255,255,255,0.1);
}

.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  gap:4px;
  cursor:pointer;

  justify-content:center;
  font-size:10px;
  text-align:center;
  min-width:60px;
}

.tab svg{
  width:22px;
  height:22px;
}

.tab.active{
  color:#1e90ff;
}

.tab.active svg{
  stroke:#1e90ff;
}

</style>
</head>

<body>
  
<div class="glow"></div>

<!-- BANNER -->
<div class="challenge-banner">

  <div class="challenge-left">
    <i data-lucide="zap"></i>
    <div class="scroll-text">DÉFI QUOTIDIEN — DÉFI QUOTIDIEN —</div>
  </div>

  <div class="close-banner">
    <i data-lucide="x"></i>
  </div>

</div>

<div class="content">

  <div class="header">
    <div class="title">WELCOME BACK</div>
    <div class="sub">Continue your evolution</div>

    <div class="xp-box">
      <div class="sub">LEVEL 3 • XP 1200</div>
      <div class="bar"><div class="fill"></div></div>
    </div>
  </div>

  <div class="section-title">PROGRESSION</div>

  <div class="grid">

    <div class="card">
      <i data-lucide="activity"></i>
      <div><h3>BPM GAME</h3><p>32 min • 148 BPM</p></div>
    </div>

    <div class="card">
      <i data-lucide="target"></i>
      <div><h3>FOCUS GATE</h3><p>18 min • 12 sessions</p></div>
    </div>

    <div class="card">
      <i data-lucide="repeat"></i>
      <div><h3>RHYTHM</h3><p>24 min • 34 clears</p></div>
    </div>

    <div class="card">
      <i data-lucide="sparkles"></i>
      <div><h3>ACTING</h3><p>9 min • last prompt</p></div>
    </div>

  </div>

  <div class="section-title">PLAN D’ENTRAÎNEMENT</div>

  <div class="tasks">

    <label class="task">
      <input type="checkbox">
      <span>10 min BPM focus</span>
    </label>

    <label class="task">
      <input type="checkbox">
      <span>Rhythm control</span>
    </label>

    <label class="task">
      <input type="checkbox">
      <span>Flow improvisation</span>
    </label>

  </div>

  <div class="section-title">OBJECTIFS</div>

  <div class="note-box">
    <textarea id="objectives" placeholder="Écris ton objectif du moment..."></textarea>
  </div>

</div>

<!-- BOTTOM -->
<div class="bottom-bar">

  <div class="tab" onclick="window.location='music.html'">
    <i data-lucide="headphones"></i>
    MUSIC
  </div>

  <div class="tab" onclick="window.location='health.html'">
    <i data-lucide="heart-plus"></i>
    SANTÉ
  </div>

  <div class="tab" onclick="window.location='playground.html'">
    <i data-lucide="gamepad-2"></i>
    JOUER
  </div>

  <div class="tab" onclick="window.location='library.html'">
    <i data-lucide="box"></i>
    BIBLIOTHÈQUE
  </div>

  <div class="tab active">
    <i data-lucide="activity"></i>
    PROGRESS
  </div>  

</div>

</div>

<script>
lucide.createIcons();

/* SAVE OBJECTIVES */
const objectives = document.getElementById("objectives");

window.addEventListener("load", () => {
  const saved = localStorage.getItem("motrix_objectives");
  if(saved) objectives.value = saved;
});

objectives.addEventListener("input", () => {
  localStorage.setItem("motrix_objectives", objectives.value);
});
</script>

</body>
</html>
