<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Library</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* ===== GLOW ===== */
.glow{
  position:absolute;
  width:350px;
  height:380px;
  z-index: -10;
  background:#1e90ff;
  filter:blur(160px);
  opacity:0.18;
  border-radius:80%;
}

/* ===== TOP ===== */
.top-box{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:10;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(14px);
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* SEARCH */
.search-bar{
  display:flex;
  align-items:center;
  gap:8px;
  margin:14px 0 10px 0;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}

.search-bar input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:#fff;
  font-size:14px;
}

.search-bar svg{
  width:18px;
  height:18px;
  stroke:rgba(255,255,255,0.6);
}

.clear{
  width:18px;
  height:18px;
  cursor:pointer;
  opacity:0.6;
  display:none;
  flex-shrink:0;
}

/* CATEGORY */
.category-bar{
  display:flex;
  position:relative;
}

.category{
  flex:1;
  text-align:center;
  font-size:11px;
  padding:8px 0;
  color:rgba(255,255,255,0.5);
  cursor:pointer;
}

.category.active{
  color:#1e90ff;
}

/* INDICATOR */
#indicator{
  position:absolute;
  bottom:0;
  left:0;
  height:2px;
  width:0;
  background:#1e90ff;
  transition:0.3s ease;
  box-shadow:0 0 8px rgba(30,144,255,0.6);
}

/* ===== CONTENT ===== */
.content{
  padding:140px 16px 90px;
  height:100vh;
  overflow-y:auto;
}

.content::-webkit-scrollbar{
  display:none;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;

  display:flex;
  align-items:center;
  gap:12px;

  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  border-color:#1e90ff;
  transform:translateY(-2px);
}

.card i{
  width:22px;
  height:22px;
  stroke:#1e90ff;
}

.card h3{
  margin:0;
  font-size:15px;
}

.card p{
  margin:4px 0 0;
  font-size:12px;
  color:rgba(255,255,255,0.5);
}

/* ===== BOTTOM ===== */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  display:flex;
  justify-content:space-around;
  padding:14px 0;

  background:#000;
  border-top:1px solid rgba(255,255,255,0.1);
}

.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  gap:4px;
  cursor:pointer;

  justify-content:center;
  font-size:10px;
  text-align:center;
  min-width:60px;
}

.tab svg{
  width:22px;
  height:22px;
}

.tab.active{
  color:#1e90ff;
}

.tab.active svg{
  stroke:#1e90ff;
}

</style>
</head>

<body>

<div class="glow"></div>

<!-- TOP -->
<div class="top-box">

  <div class="search-bar">
    <i data-lucide="search"></i>

    <input id="searchInput" type="text" placeholder="Rechercher un step..." />

    <i id="clearBtn" data-lucide="x" class="clear"></i>
  </div>

  <div class="category-bar">
    <div class="category active" onclick="setCat(this,'ALL')">ALL</div>
    <div class="category" onclick="setCat(this,'RHYTHM')">RHYTHM</div>
    <div class="category" onclick="setCat(this,'FLOW')">FLOW</div>
    <div class="category" onclick="setCat(this,'FOCUS')">FOCUS</div>
    <div class="category" onclick="setCat(this,'TECH')">TECH</div>

    <div id="indicator"></div>
  </div>

</div>

<!-- CONTENT -->
<div class="content" id="list"></div>

<!-- BOTTOM -->
<div class="bottom-bar">

  <div class="tab" onclick="window.location='music.html'">
    <i data-lucide="headphones"></i>
    MUSIC
  </div>

  <div class="tab" onclick="window.location='health.html'">
    <i data-lucide="heart-plus"></i>
    SANTÉ
  </div>

  <div class="tab" onclick="window.location='playground.html'">
    <i data-lucide="gamepad-2"></i>
    JOUER
  </div>

  <div class="tab active">
    <i data-lucide="box"></i>
    BIBLIOTHÈQUE
  </div>

  <div class="tab" onclick="window.location='dashboard.html'">
    <i data-lucide="activity"></i>
    PROGRESS
  </div>  

</div>

<script>
lucide.createIcons();

/* DATA */
const steps = [
  {title:"Flow Basics", desc:"contrôle du mouvement", icon:"wind", cat:"FLOW"},
  {title:"Rhythm Drill", desc:"timing & précision", icon:"repeat", cat:"RHYTHM"},
  {title:"Focus Lock", desc:"contrôle corporel", icon:"target", cat:"FOCUS"},
  {title:"Tech Step", desc:"technique pure", icon:"cpu", cat:"TECH"},
  {title:"Express Flow", desc:"créativité", icon:"sparkles", cat:"FLOW"},
];

let current = "ALL";

/* RENDER */
function render(){

  const q = document.getElementById("searchInput").value.toLowerCase();

  const filtered = steps.filter(s=>{
    return (current==="ALL" || s.cat===current) &&
           s.title.toLowerCase().includes(q);
  });

  document.getElementById("list").innerHTML =
  filtered.map(s=>`
    <div class="card">
      <i data-lucide="${s.icon}"></i>
      <div>
        <h3>${s.title}</h3>
        <p>${s.desc}</p>
      </div>
    </div>
  `).join("");

  lucide.createIcons();
}

/* SEARCH CLEAR FIX */
const input = document.getElementById("searchInput");
const clear = document.getElementById("clearBtn");

function updateClear(){
  clear.style.display = input.value.length ? "block" : "none";
}

input.addEventListener("input", ()=>{
  updateClear();
  render();
});

clear.addEventListener("click", ()=>{
  input.value = "";
  updateClear();
  render();
});

updateClear();

/* CATEGORY */
function setCat(el,cat){
  current = cat;

  document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  const ind = document.getElementById("indicator");
  ind.style.width = el.offsetWidth + "px";
  ind.style.left = el.offsetLeft + "px";

  render();
}

/* INIT INDICATOR */
window.addEventListener("load",()=>{
  const a = document.querySelector(".category.active");
  const ind = document.getElementById("indicator");
  ind.style.width = a.offsetWidth + "px";
  ind.style.left = a.offsetLeft + "px";
});

/* NAV */
function go(url){
  window.location = url;
}

render();
</script>

</body>
</html>
