<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPRESSION</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* TOP */
.top{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  display:flex;
  z-index: 10;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  width:60px;
  text-align:center;
  font-size:20px;
  cursor:pointer;
  z-index: 10;
}

.title{
  flex:1;
  text-align:center;
  font-weight:bold;
}

/* CATEGORIES */
.modes{
  position:fixed;
  top:60px;left:0;right:0;
  display:flex;
  z-index: 1;
  justify-content:space-around;
  padding:10px 0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.mode{
  font-size:12px;
  opacity:0.4;
  cursor:pointer;
}

.mode.active{
  opacity:1;
  color:#1e90ff;
}

/* CENTER */
.center{
  position:fixed;
  top:0;bottom:0;left:0;right:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  text-align:center;
  padding:20px;
}

/* PROMPT */
#prompt{
  font-size:18px;
  max-width:90%;
  line-height:1.4;
  opacity:0.9;
}

/* BUTTON */
#newBtn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:#fff;
  font-size:13px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="title">EXPRESSION</div>
  <div style="width:60px"></div>
</div>

<!-- CATEGORIES -->
<div class="modes">
  <div class="mode active" onclick="setMode('concept',this)">CONCEPT</div>
  <div class="mode" onclick="setMode('character',this)">CHARACTER</div>
  <div class="mode" onclick="setMode('attitude',this)">ATTITUDE</div>
</div>

<!-- CENTER -->
<div class="center">

  <div id="prompt">Press NEW to generate</div>

  <button id="newBtn" onclick="generate()">NEW</button>

</div>

<script>

let mode="concept";

/* DATA */
const concepts=[
  "You are on a basketball court chasing a bus that never stops",
  "You are writing a letter that will change your life",
  "You are fighting a kung fu master in a forgotten temple",
  "You are performing on a boxing ring under pressure",
  "You are escaping a collapsing city",
  "You are dancing inside a dream that keeps shifting space"
];

const characters=[
  "A silent warrior who never speaks but is always heard",
  "A dancer who lost their memory but remembers movement",
  "A street fighter with poetic intelligence",
  "A mysterious performer who appears only at night",
  "A traveler who collects emotions instead of objects",
  "A king without a kingdom learning humility"
];

const attitudes=[
  "I'm unstoppable",
  "I'm calm but dangerous",
  "I'm the energy no one can control",
  "I'm broken but still shining",
  "I'm the strongest presence in the room",
  "I'm beyond fear, beyond limits",
  "I'm the conqueror of my own world"
];

/* SWITCH MODE */
function setMode(m,el){
  mode=m;

  document.querySelectorAll(".mode")
    .forEach(x=>x.classList.remove("active"));

  el.classList.add("active");

  generate();
}

/* GENERATE */
function generate(){

  let pool;

  if(mode==="concept") pool=concepts;
  if(mode==="character") pool=characters;
  if(mode==="attitude") pool=attitudes;

  let text = pool[Math.floor(Math.random()*pool.length)];

  document.getElementById("prompt").innerText = text;
}

/* INIT */
generate();

</script>

</body>
</html>
