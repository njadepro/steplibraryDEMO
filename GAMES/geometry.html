<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GÉOMÉTRIE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* TOP */
.top{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  display:flex;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
}

.back{
  width:60px;
  text-align:center;
  font-size:20px;
  cursor:pointer;
}

.title{
  flex:1;
  text-align:center;
  font-weight:bold;
}

/* MODES */
.modes{
  position:fixed;
  top:60px;left:0;right:0;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:9;
}

.mode{
  font-size:12px;
  opacity:0.4;
  cursor:pointer;
}

.mode.active{
  opacity:1;
  color:#1e90ff;
}

/* CENTER */
.center{
  position:fixed;
  top:0;bottom:0;left:0;right:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:16px;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,60px);
  grid-template-rows:repeat(4,60px);
  gap:10px;
}

/* CELL */
.cell{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;
  transition:0.15s;
}

.cell.point{
  background:rgba(255,255,255,0.15);
}

.cell.trace{
  background:rgba(30,144,255,0.25);
  border:1px solid rgba(30,144,255,0.5);
}

.cell.shape{
  background:#1e90ff;
  box-shadow:0 0 10px rgba(30,144,255,0.6);
}

/* INFO */
.info{
  font-size:12px;
  opacity:0.6;
  text-align:center;
  padding:0 20px;
}

/* BUTTONS */
#newBtn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:#fff;
  font-size:13px;
}

#modeInfo{
  font-size:11px;
  opacity:0.5;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="title">GÉOMÉTRIE</div>
  <div style="width:60px"></div>
</div>

<!-- MODES -->
<div class="modes">
  <div class="mode active" onclick="setMode('trace',this)">TRACE</div>
  <div class="mode" onclick="setMode('points',this)">POINTS</div>
  <div class="mode" onclick="setMode('shape',this)">SHAPE</div>
</div>

<!-- CENTER -->
<div class="center">

  <div id="grid"></div>

  <div class="info" id="info">
    TRACE MODE — follow spatial path in freestyle
  </div>

  <button id="newBtn" onclick="generateMode()">NEW</button>

  <div id="modeInfo"></div>

</div>

<script>

let mode="trace";
let grid=[];

const shapes=[
  "CIRCLE",
  "SQUARE",
  "TRIANGLE",
  "OVAL",
  "INFINITE",
  "THREAD",
  "LINE"
];

let currentShape="";

/* INIT */
function initGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[];

  for(let i=0;i<16;i++){
    const c=document.createElement("div");
    c.className="cell";

    grid.push(c);
    g.appendChild(c);
  }

  generateMode();
}

/* RESET */
function reset(){
  grid.forEach(c=>{
    c.className="cell";
  });
}

/* GENERATE MODE */
function generateMode(){
  reset();

  if(mode==="points") generatePoints();
  if(mode==="trace") generateTrace();
  if(mode==="shape") generateShape();
}

/* POINTS */
function generatePoints(){
  grid.forEach(c=>{
    if(Math.random()>0.7){
      c.classList.add("point");
    }
  });
}

/* TRACE */
function generateTrace(){

  let path = [];

  // start point
  let current = Math.floor(Math.random() * 16);
  path.push(current);

  // generate random walk path
  for(let i=0;i<6;i++){

    let next;

    do {
      next = current + (Math.random() > 0.5 ? 1 : -1) * (Math.random() > 0.5 ? 4 : 1);
    } while(next < 0 || next >= 16);

    path.push(next);
    current = next;
  }

  // apply visual
  path.forEach(i=>{
    if(grid[i]){
      grid[i].classList.add("trace");
    }
  });
}

/* SHAPE */
function generateShape(){

  currentShape = shapes[Math.floor(Math.random()*shapes.length)];

  document.getElementById("info").innerText =
    "SHAPE MODE — " + currentShape + " (embody in freestyle)";

  let pattern=[];

  switch(currentShape){

    case "CIRCLE":
      pattern=[5,6,9,10];
      break;

    case "SQUARE":
      pattern=[0,1,4,5];
      break;

    case "TRIANGLE":
      pattern=[1,4,5,6];
      break;

    case "OVAL":
      pattern=[5,6,7,10];
      break;

    case "INFINITE":
      pattern=[0,5,10,15,3,6,9,12];
      break;

    case "THREAD":
      pattern=[0,1,2,5,8,9,10,13];
      break;

    case "LINE":
      pattern=[3,7,11,15];
      break;
  }

  pattern.forEach(i=>{
    if(grid[i]) grid[i].classList.add("shape");
  });
}

/* MODE SWITCH */
function setMode(m,el){
  mode=m;

  document.querySelectorAll(".mode")
    .forEach(x=>x.classList.remove("active"));

  el.classList.add("active");

  updateInfo();
  generateMode(); // reset on switch
}

/* INFO */
function updateInfo(){
  const info=document.getElementById("info");

  if(mode==="trace"){
    info.innerText="TRACE MODE — follow spatial path in freestyle";
  }

  if(mode==="points"){
    info.innerText="POINTS MODE — connect spatial anchors in freestyle";
  }

  if(mode==="shape"){
    info.innerText="SHAPE MODE — embody geometry in movement";
  }
}

/* INIT */
initGrid();

</script>

</body>
</html>
