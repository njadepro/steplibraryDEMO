<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUIZZ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* TOP */
.top{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  z-index:30;

  display:flex;
  align-items:center;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  width:60px;
  text-align:center;
  font-size:20px;
  cursor:pointer;
}

.title{
  flex:1;
  text-align:center;
  font-weight:bold;
}

/* CENTER */
.center{
  position:fixed;
  top:0;bottom:0;left:0;right:0;
  z-index:5;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}

/* READY */
#readyText{
  position:absolute;
  top:50%;
  transform:translateY(-140%);
  font-size:20px;
  font-weight:bold;
  letter-spacing:2px;
  z-index:15;
  pointer-events:none;
  color: #ffffff8a;
}

</style>
</head>

<!-- TOP -->
<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="title">QUIZZ</div>
  <div style="width:60px"></div>
</div>

<div class="center">
  <div id="readyText">EN COURS DE CONSTRUCTION</div>
</div>
