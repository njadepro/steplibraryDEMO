<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BPM GAME</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }

  /* TOP */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;

    z-index: 10;

    display: flex;
    align-items: center;

    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

 .back{
    width:60px;
    text-align:center;
    font-size:20px;
    cursor:pointer;

    position: relative;
    z-index: 10;
  }

  .title {
    flex: 1;
    text-align: center;
    font-weight: bold;
  }

  /* CATEGORIES */
  .categories {
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;

    z-index: 1;

    display: flex;
    justify-content: space-around;

    padding: 10px 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .cat {
    font-size: 12px;
    opacity: 0.4;
    cursor: pointer;
  }

  .cat.active {
    opacity: 1;
    color: #1e90ff;
    font-weight: bold;
  }

  /* CENTER FIX (VRAI CENTRAGE) */
  .center {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
  }

  #word {
    font-size: 34px;
    margin-bottom: 25px;
  }

  #mainBtn {
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    background: #1e90ff;
    color: #fff;
  }

  /* BOTTOM */
  .bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 12px 15px;

    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .bpm {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .mute {
    font-size: 22px;
  }

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="back" onclick="goHome()">←</div>
  <div class="title">BPM GAME</div>
  <div style="width:60px;"></div>
</div>

<!-- CATEGORIES -->
<div class="categories">
  <div class="cat active" onclick="setCat('body', this)">CORPS</div>
  <div class="cat" onclick="setCat('direction', this)">DIRECTION</div>
  <div class="cat" onclick="setCat('space', this)">ESPACE</div>
</div>

<!-- CENTER -->
<div class="center">
  <div id="word">READY</div>
  <button id="mainBtn" onclick="toggleGame()">START</button>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="bpm">
    <button onclick="changeBpm(-5)">-</button>
    <div id="bpm">50</div>
    <button onclick="changeBpm(5)">+</button>
  </div>

  <div onclick="toggleMute()" class="mute" id="mute">🔊</div>
</div>

<script>

/* STATE */
let bpm = 50;
let running = false;
let timer;
let activeCat = "body";
let clickOn = true;
let beatCount = 0;

/* AUDIO */
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();
const beatsPerWord = 4;

function playClick(){
  if(!clickOn) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 900;
  gain.gain.value = 0.15;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function speak(t){
  const u = new SpeechSynthesisUtterance(t);
  u.lang = "fr-FR";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* DATA */
const body = ["PIEDS","HANCHES","GENOUX","BUSTE","ÉPAULES","COUDES","MAINS","DOIGTS"];
const direction = ["HAUT","BAS","GAUCHE","DROITE","AVANT","ARRIÈRE","DIAGONALE"];
const space = ["PETIT","MOYEN","GRAND"];

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* GAME */
function toggleGame(){
  if(!running) startGame();
  else stopGame();
}

function startGame(){
  running = true;
  document.getElementById("mainBtn").innerText = "STOP";

  audioCtx.resume();
  speechSynthesis.resume();

  loop();
}

function stopGame(){
  running = false;
  clearTimeout(timer);

  document.getElementById("mainBtn").innerText = "START";
  document.getElementById("word").innerText = "READY";
}

/* LOOP */
function loop(){
  if(!running) return;

  playClick();

  beatCount++;

  // 🔥 changement de mot seulement tous les 4 beats
  if(beatCount >= beatsPerWord){
    beatCount = 0;

    let word = "";

    if(activeCat === "body") word = pick(body);
    if(activeCat === "direction") word = pick(direction);
    if(activeCat === "space") word = pick(space);

    document.getElementById("word").innerText = word;
    speak(word);
  }

  timer = setTimeout(loop, (60/bpm)*1000);
}

/* BPM */
function changeBpm(v){
  bpm = Math.max(40, Math.min(220, bpm + v));
  document.getElementById("bpm").innerText = bpm;
}

/* CATEGORY FIX (IMPORTANT) */
function setCat(cat, el){
  activeCat = cat;

  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

/* MUTE */
function toggleMute(){
  clickOn = !clickOn;
  document.getElementById("mute").innerText = clickOn ? "🔊" : "🔇";
}

/* BACK */
function goHome(){
  window.location.href = 'playground.html';
}

</script>

</body>
</html>
