<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Motrix - Play</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
  }

  .screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ===== BANNER ===== */
  .challenge-banner{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:50;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:8px 12px;
    background:rgba(30,144,255,0.08);
    border-bottom:1px solid rgba(30,144,255,0.25);
    backdrop-filter:blur(10px);
  }

  .challenge-left{
    display:flex;
    align-items:center;
    gap:8px;
    flex:1;
    overflow:hidden;
  }

  .challenge-left i{
    width:18px;
    height:18px;
    stroke:#1e90ff;
    filter:drop-shadow(0 0 6px rgba(30,144,255,0.6));
  }

  .scroll-text{
    white-space:nowrap;
    animation:scroll 10s linear infinite;
    color:#1e90ff;
    font-weight:600;
    font-size:12px;
  }

  @keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
  }

  .close-banner i{
    width:18px;
    height:18px;
    stroke:rgba(255,255,255,0.7);
    cursor:pointer;
  }

  /* ===== CONTENT ===== */
  .content{
    flex:1;
    padding:90px 16px 90px;
  }

  .title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    letter-spacing:2px;
  }

  .sub{
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.5);
    margin-bottom:20px;
  }

  /* ===== GAME CARDS ===== */
  .card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:0.2s;
  }

  .card:hover{
    border-color:#1e90ff;
    transform:translateY(-2px);
  }

  .card i{
    width:22px;
    height:22px;
    stroke:#1e90ff;
  }

  .card h3{
    margin:0;
    font-size:15px;
  }

  .card p{
    margin:4px 0 0;
    font-size:12px;
    color:rgba(255,255,255,0.5);
  }

  /* ===== CHALLENGE CARD ===== */
  .challenge-card{
    border:1px solid #1e90ff;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
  }

  .tag{
    font-size:10px;
    color:#1e90ff;
    margin-bottom:5px;
  }

  /* ===== BOTTOM BAR ===== */
  .bottom-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
    padding:14px 0;
    background:#000;
    border-top:1px solid rgba(255,255,255,0.1);
  }

  .tab{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:10px;
    color:rgba(255,255,255,0.4);
    gap:4px;
  }

  .tab svg{
    width:22px;
    height:22px;
  }

  .tab.active{
    color:#1e90ff;
  }

  .tab.active svg{
    stroke:#1e90ff;
  }

</style>
</head>

<body>

<!-- BANNER GLOBAL -->
<div class="challenge-banner">

  <div class="challenge-left" onclick="openChallenge()">
    <i data-lucide="zap"></i>

    <div class="scroll-text">
      DÉFI QUOTIDIEN — DÉFI QUOTIDIEN — DÉFI QUOTIDIEN —
    </div>
  </div>

  <div class="close-banner" onclick="openWarning()">
    <i data-lucide="x"></i>
  </div>

</div>

<div class="screen">

  <div id="content" class="content"></div>

  <!-- BOTTOM -->
  <div class="bottom-bar">

    <div class="tab" onclick="go('dashboard.html')">
      <i data-lucide="home"></i>
      ACCUEIL
    </div>

    <div class="tab active">
      <i data-lucide="activity"></i>
      PLAY
    </div>

    <div class="tab" onclick="go('steplibrary.html')">
      <i data-lucide="box"></i>
      LIBRARY
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script>

function renderPlay(){

  const data = JSON.parse(localStorage.getItem("motrix_challenge"));

  let challengeHTML = "";

  if(data && data.active){
    challengeHTML = `
      <div class="challenge-card">
        <div class="tag">DÉFI ACTIF</div>
        <div>${data.type.toUpperCase()} — progression ${data.progress}%</div>
      </div>
    `;
  }

  document.getElementById("content").innerHTML = `

    <div class="title">AIRE DE JEUX</div>
    <p></p>

    <div class="card" onclick="go('bpm.html')">
      <i data-lucide="activity"></i>
      <div>
        <h3>JEU DU MÉTRONOME</h3>
        <p>Timing et précision</p>
      </div>
    </div>

    <div class="card" onclick="go('rhythm.html')">
      <i data-lucide="repeat"></i>
      <div>
        <h3>SWITCH RYTHMIQUE</h3>
        <p>Patterns dynamiques</p>
      </div>
    </div>

    <div class="card" onclick="go('geometry.html')">
      <i data-lucide="grid"></i>
      <div>
        <h3>GRILLE GÉOMÉTRIQUE</h3>
        <p>Espace et mouvement</p>
      </div>
    </div>

    <div class="card" onclick="go('focus.html')">
      <i data-lucide="target"></i>
      <div>
        <h3>FOCUS</h3>
        <p>Contrôle corporel</p>
      </div>
    </div>

    <div class="card" onclick="go('acting.html')">
      <i data-lucide="theater"></i>
      <div>
        <h3>EXPRESSION</h3>
        <p>Émotions & performance</p>
      </div>
    </div>

    ${challengeHTML}

  `;

  lucide.createIcons();
}

function go(url){
  window.location = url;
}

/* placeholder */
function openChallenge(){
  alert("ouvrir popup challenge");
}

function openWarning(){
  alert("warning challenge");
}

/* INIT */
renderPlay();
lucide.createIcons();

</script>

</body>
</html>
